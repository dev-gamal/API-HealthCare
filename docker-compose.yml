version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: healthcare_db
    restart: no
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: healthcare_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    networks:
      - healthcare-net
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root" ]
      interval: 10s
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: healthcare_app
    restart: no
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/healthcare_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
    networks:
      - healthcare-net

networks:
  healthcare-net:
    driver: bridge

volumes:
  mysql_data: